<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifremi Unuttum — Muck</title>
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>
  <main class="auth-card">
    <h1>Şifreni sıfırla</h1>
    <p class="auth-sub">E-posta adresine bir sıfırlama bağlantısı göndereceğiz.</p>
    <form id="forgot-form" novalidate>
      <label class="field">
        <span class="field-label">E-posta <em>*</em></span>
        <input id="email" type="email" autocomplete="email" required maxlength="254" />
      </label>
      <p class="auth-error hidden" id="error" role="alert"></p>
      <p class="auth-ok hidden" id="ok" role="status"></p>
      <button type="submit" class="auth-btn" id="submit">Bağlantı Gönder</button>
    </form>
    <p class="auth-foot"><a href="/login">Girişe dön</a></p>
  </main>
  <script type="module" src="/auth-forgot.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kayıt Ol — Muck</title>
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-bg" aria-hidden="true"></div>
  <main class="auth-card auth-card--wide">
    <h1>Bir hesap oluştur</h1>
    <form id="register-form" novalidate>
      <label class="field">
        <span class="field-label">E-posta <em>*</em></span>
        <input id="email" type="email" autocomplete="email" required maxlength="254" />
      </label>
      <label class="field">
        <span class="field-label">Görünen Ad</span>
        <input id="display-name" type="text" autocomplete="nickname" maxlength="32" />
      </label>
      <label class="field">
        <span class="field-label">Kullanıcı Adı <em>*</em></span>
        <input id="username" type="text" autocomplete="username" required maxlength="20" pattern="[A-Za-z0-9_]{3,20}" />
      </label>
      <label class="field">
        <span class="field-label">Şifre <em>*</em></span>
        <input id="password" type="password" autocomplete="new-password" required minlength="6" maxlength="100" />
      </label>

      <div class="field">
        <span class="field-label">Doğum Tarihi <em>*</em></span>
        <div class="dob-row" id="dob-row">
          <div class="dob-select" data-dob="day">
            <button type="button" class="dob-btn" id="dob-day-btn" aria-haspopup="listbox" aria-expanded="false">
              <span id="dob-day-label">Gün</span>
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
            </button>
            <ul class="dob-menu hidden" id="dob-day-menu" role="listbox"></ul>
          </div>
          <div class="dob-select" data-dob="month">
            <button type="button" class="dob-btn" id="dob-month-btn" aria-haspopup="listbox" aria-expanded="false">
              <span id="dob-month-label">Ay</span>
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
            </button>
            <ul class="dob-menu hidden" id="dob-month-menu" role="listbox"></ul>
          </div>
          <div class="dob-select" data-dob="year">
            <button type="button" class="dob-btn" id="dob-year-btn" aria-haspopup="listbox" aria-expanded="false">
              <span id="dob-year-label">Yıl</span>
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
            </button>
            <ul class="dob-menu hidden" id="dob-year-menu" role="listbox"></ul>
          </div>
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" id="marketing" />
        <span>(İsteğe bağlı) Muck güncellemeleri, ipuçları ve özel teklifler için e-posta almak istiyorum. Bundan istediğin zaman vazgeçebilirsin.</span>
      </label>

      <p class="auth-legal">
        "Hesap Oluştur" butonuna tıklayarak Muck'ın
        <a href="/terms" target="_blank" rel="noopener">Hizmet Koşullarını</a>
        onayladığını ve
        <a href="/privacy" target="_blank" rel="noopener">Gizlilik Politikamızı</a>
        okuduğunu kabul etmiş olursun.
      </p>

      <p class="auth-error hidden" id="error" role="alert"></p>
      <button type="submit" class="auth-btn" id="submit">Hesap Oluştur</button>
    </form>
    <p class="auth-foot">Zaten bir hesabın var mı? <a href="/login">Giriş yap</a></p>
  </main>
  <script type="module" src="/auth-register.js"></script>
</body>
</html>

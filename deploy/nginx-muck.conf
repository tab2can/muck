# Muck — muck.tr
# Kurulum:
#   sudo cp deploy/nginx-muck.conf /etc/nginx/sites-available/muck
#   sudo ln -sf /etc/nginx/sites-available/muck /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d muck.tr -d www.muck.tr
#
# Certbot SSL ekledikten sonra aşağıdaki listen 443 bloğunu kontrol edin;
# özellikle /socket.io/ location'ı WebSocket için kalmalı.

server {
    listen 80;
    server_name muck.tr www.muck.tr;

    # Socket.IO — WebSocket + long-polling (ses sinyalleşmesi için kritik)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}


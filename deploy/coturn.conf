# coturn — Muck TURN (WebRTC medya relay)
# Kurulum: bash deploy/install-turn.sh

listening-port=3478
fingerprint
lt-cred-mech
use-auth-secret
# Bu secret, uygulamanın TURN_SECRET değeri ile AYNI olmalı
static-auth-secret=CHANGE_ME_MUCK_TURN_SECRET

realm=muck.tr
server-name=muck.tr

# Dış IP (script doldurur) — NAT arkasında zorunlu
# external-ip=YOUR.PUBLIC.IP

min-port=49160
max-port=49200
no-cli
no-tls
no-dtls
verbose
log-file=/var/log/turnserver.log
simple-log
